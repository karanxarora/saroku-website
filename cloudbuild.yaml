steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/pi-ai-490805/saroku-website/saroku-website:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/pi-ai-490805/saroku-website/saroku-website:latest'
      - 'website/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/pi-ai-490805/saroku-website/saroku-website'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'saroku-website'
      - '--image'
      - 'us-central1-docker.pkg.dev/pi-ai-490805/saroku-website/saroku-website:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--quiet'

images:
  - 'us-central1-docker.pkg.dev/pi-ai-490805/saroku-website/saroku-website'

options:
  logging: CLOUD_LOGGING_ONLY
